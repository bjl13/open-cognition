services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cognition
      POSTGRES_PASSWORD: cognition
      POSTGRES_DB: cognition
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - cognition
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cognition -d cognition"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - cognition
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  control-plane:
    build:
      context: .
      dockerfile: cmd/control-plane/Dockerfile
    environment:
      DATABASE_URL: postgres://cognition:cognition@postgres:5432/cognition?sslmode=disable
      PORT: "8080"
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: cognition
      STORAGE_ACCESS_KEY_ID: minioadmin
      STORAGE_SECRET_ACCESS_KEY: minioadmin
      STORAGE_REGION: us-east-1
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - cognition
    restart: unless-stopped

volumes:
  pg_data:
  minio_data:

networks:
  cognition:
    driver: bridge
