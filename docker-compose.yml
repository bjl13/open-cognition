services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cognition
      POSTGRES_PASSWORD: cognition
      POSTGRES_DB: cognition
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - cognition
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cognition -d cognition"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - cognition
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
  minio_data:

networks:
  cognition:
    driver: bridge
