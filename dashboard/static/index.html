<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>open-cognition</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2a2d3a;
      --text:     #d0d4e0;
      --muted:    #6b7080;
      --accent:   #4f8ef7;
      --running:  #34c759;
      --stopped:  #ff453a;
      --font-mono: "JetBrains Mono", "Fira Mono", "Cascadia Mono", ui-monospace, monospace;
      --font-sans: "Inter", system-ui, -apple-system, sans-serif;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ---- Layout ---- */

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--text);
      white-space: nowrap;
    }

    #status-banner {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .mode-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-banner.running .mode-dot  { background: var(--running); box-shadow: 0 0 6px var(--running); }
    .status-banner.stopped .mode-dot  { background: var(--stopped); box-shadow: 0 0 6px var(--stopped); }
    .status-banner.running .mode-label { color: var(--running); }
    .status-banner.stopped .mode-label { color: var(--stopped); }

    .mode-label {
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.06em;
    }

    .mode-meta {
      font-size: 12px;
      color: var(--muted);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }

    #last-updated {
      font-size: 11px;
      color: var(--muted);
    }

    #countdown {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--font-mono);
      min-width: 26px;
      text-align: right;
    }

    button {
      background: var(--border);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: var(--font-sans);
      transition: background 0.15s;
    }
    button:hover { background: #35394a; }
    button:disabled { opacity: 0.4; cursor: default; }

    #error-bar {
      display: none;
      background: #3a1a1a;
      border: 1px solid var(--stopped);
      color: #ff8080;
      padding: 8px 24px;
      font-size: 13px;
    }

    main {
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    /* ---- Sections ---- */

    section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
    }

    .section-header h2 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--text);
      flex: 1;
    }

    .section-count {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--font-mono);
      background: var(--border);
      padding: 2px 8px;
      border-radius: 10px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12.5px;
    }

    thead th {
      padding: 8px 12px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    thead th.right { text-align: right; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.025); }

    td {
      padding: 8px 12px;
      vertical-align: middle;
      color: var(--text);
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    td.mono {
      font-family: var(--font-mono);
      font-size: 11.5px;
      color: var(--accent);
      cursor: default;
    }

    td.right { text-align: right; }
    td.nowrap { white-space: nowrap; font-size: 11.5px; color: var(--muted); }

    td.context {
      max-width: 320px;
      color: var(--muted);
      font-size: 12px;
    }

    td.detail {
      max-width: 300px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
    }

    .empty {
      padding: 24px 16px;
      color: var(--muted);
      font-size: 13px;
    }

    /* ---- Badges ---- */

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .type-observation  { background: #1a2a3a; color: #60aaee; }
    .type-document     { background: #1a2e20; color: #60cc80; }
    .type-tool_output  { background: #2a2218; color: #ddaa44; }
    .type-policy       { background: #2a1a2a; color: #cc80cc; }

    .action-create_canonical { background: #1a2a3a; color: #60aaee; }
    .action-create_reference { background: #1a2e20; color: #60cc80; }
    .action-stop             { background: #3a1a1a; color: #ff8080; }
    .action-resume           { background: #1a2e20; color: #60cc80; }
    .action-init             { background: #2a2218; color: #ddaa44; }
  </style>
</head>
<body>

<header>
  <h1>open-cognition</h1>
  <div id="status-banner" class="status-banner">
    <span class="mode-dot"></span>
    <span class="mode-label">—</span>
  </div>
  <div class="header-right">
    <span id="last-updated"></span>
    <button id="refresh-btn">Refresh</button>
    <span id="countdown"></span>
  </div>
</header>

<div id="error-bar"></div>

<main>

  <section id="canonicals-section">
    <div class="section-header">
      <h2>Canonical Objects</h2>
      <span class="section-count"><span id="canonicals-count">—</span></span>
    </div>
    <div class="table-wrap"><p class="empty">Loading…</p></div>
  </section>

  <section id="references-section">
    <div class="section-header">
      <h2>Agent References</h2>
      <span class="section-count"><span id="references-count">—</span></span>
    </div>
    <div class="table-wrap"><p class="empty">Loading…</p></div>
  </section>

  <section id="audit-section">
    <div class="section-header">
      <h2>Audit Log</h2>
      <span class="section-count"><span id="audit-count">—</span></span>
    </div>
    <div class="table-wrap"><p class="empty">Loading…</p></div>
  </section>

</main>

<script type="module" src="main.js"></script>
</body>
</html>
